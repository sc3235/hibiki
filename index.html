<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111009">
  <title>Audio Sub Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #111009;
      --surface:   #1c1916;
      --surface-2: #242118;
      --border:    #2e2b22;
      --border-2:  #3a362b;
      --text:      #ede8dd;
      --text-2:    #7d7567;
      --text-3:    #453f35;
      --accent:    #a134c9;
      --green:     #6ba676;
      --radius:    14px;
      --sub-font:  1.5rem;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { background: var(--bg); }

    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding: 0 1.5rem 4rem;
      max-width: 600px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 600px;
      z-index: 100;
      background: var(--bg);
      padding: calc(env(safe-area-inset-top) + 1.25rem) 1.5rem 0;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1;
    }
    h1 em { font-style: italic; color: var(--accent); }
    .tagline {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--text-3);
      margin-top: 0.55rem;
    }

    /* ── Tabs ── */
    .tab-row {
      display: flex;
      margin-top: 0.75rem;
    }
    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 2px solid var(--border);
      padding: 0.5rem 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-3);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.15s, border-bottom-color 0.15s;
    }
    .tab-btn.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }

    /* ── Choose from Library button ── */
    .choose-lib-btn {
      display: block;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.875rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-2);
      cursor: pointer;
      text-align: center;
      margin-bottom: 1rem;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.12s, color 0.12s;
    }
    .choose-lib-btn:active { background: var(--surface-2); color: var(--text); }

    /* ── Episode info strip (shown when loaded from library) ── */
    .episode-info {
      display: none;
      flex-direction: column;
      gap: 0.1rem;
      padding: 0.6rem 0.875rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 1rem;
    }
    .episode-info.visible { display: flex; }
    .episode-info-show {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-3);
    }
    .episode-info-ep {
      font-size: 1rem;
      font-weight: 300;
      color: var(--text);
    }

    /* ── Native audio ── */
    audio {
      width: 100%;
      border-radius: var(--radius);
      margin-bottom: 1.25rem;
    }

    /* ── Subtitle scroll ── */
    .subtitle-wrap {
      position: relative;
      margin-bottom: 1rem;
    }
    .subtitle-wrap::before {
      content: '';
      position: absolute;
      top: 0; left: 20%; right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.5;
      z-index: 2;
      pointer-events: none;
    }

    .subtitle-scroll {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      height: 52vh;
      min-height: 260px;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
      padding: 25vh 0;
    }
    .subtitle-scroll::-webkit-scrollbar { display: none; }

    .fade-top, .fade-bottom {
      position: absolute;
      left: 0; right: 0;
      height: 5rem;
      pointer-events: none;
      z-index: 1;
    }
    .fade-top    { top: 0;    background: linear-gradient(to bottom, var(--surface), transparent); border-radius: 20px 20px 0 0; }
    .fade-bottom { bottom: 0; background: linear-gradient(to top,    var(--surface), transparent); border-radius: 0 0 20px 20px; }

    .sub-empty {
      text-align: center;
      padding: 0 2rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-3);
      letter-spacing: 0.2em;
    }

    .sub-item {
      display: flex;
      align-items: stretch;
      opacity: 0.28;
      transition: opacity 0.2s;
    }
    .sub-item.active { opacity: 1; }

    .sub-jump {
      flex-shrink: 0;
      width: 14px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      margin: 0.3rem 0;
    }
    .sub-jump::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      background: var(--border-2);
      border-radius: 1px;
      transition: background 0.15s, width 0.15s;
    }
    .sub-jump:active::after,
    .sub-jump:hover::after {
      width: 4px;
      background: var(--accent);
    }
    .sub-item.active .sub-jump::after {
      background: var(--accent);
      opacity: 0.7;
    }

    .sub-content {
      flex: 1;
      min-width: 0;
      padding: 0.55rem 1.75rem 0.55rem 0.5rem;
    }

    .sub-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem;
      color: var(--text-3);
      letter-spacing: 0.15em;
      margin-bottom: 0.15rem;
    }
    .sub-item.active .sub-time { color: var(--text-2); }

    .sub-text {
      font-family: 'Noto Serif JP', 'Hiragino Mincho ProN', serif;
      font-size: var(--sub-font);
      line-height: 1.8;
      color: var(--text);
      user-select: text;
      -webkit-user-select: text;
      font-weight: 300;
    }
    .sub-item.active .sub-text { font-weight: 400; }

    /* ── Controls ── */
    .controls-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    .ctrl-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.75rem 1.1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-2);
      cursor: pointer;
      letter-spacing: 0.05em;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.12s, color 0.12s;
    }
    .ctrl-btn:active { background: var(--surface-2); color: var(--text); }
    .play-btn {
      background: var(--surface-2);
      border-color: var(--border-2);
      width: 5rem;
      padding: 0.75rem 0;
      text-align: center;
      font-size: 1.05rem;
      color: var(--text);
    }

    /* ── Settings row ── */
    .settings-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .setting-box {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.65rem 0.875rem;
    }
    .setting-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.18em;
    }
    .setting-controls {
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }
    .setting-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      font-weight: 500;
      min-width: 2.6rem;
      text-align: center;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .adj-btn {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.3rem 0.55rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-2);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .adj-btn:active { background: var(--border-2); }

    /* ── Toggles ── */
    .toggle-row {
      display: flex;
      gap: 0.5rem;
    }
    .toggle-btn {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      color: var(--text-3);
      letter-spacing: 0.12em;
      cursor: pointer;
      text-transform: uppercase;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .toggle-btn.on {
      background: rgba(161,52,201,0.1);
      border-color: rgba(161,52,201,0.4);
      color: var(--accent);
    }

    /* ── Library view ── */
    #library-view { display: none; }

    .lib-section { margin-bottom: 2rem; }

    .lib-section-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 0.875rem;
    }
    summary.lib-section-title {
      list-style: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    summary.lib-section-title::-webkit-details-marker { display: none; }
    summary.lib-section-title::before { content: '▸  '; }
    details[open] > summary.lib-section-title::before { content: '▾  '; }
    details.lib-section > summary.lib-section-title { margin-bottom: 0; }
    details[open].lib-section > summary.lib-section-title { margin-bottom: 0.875rem; }

    /* Quick Import */
    .quick-import {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1rem 1.1rem;
    }
    .qi-field-row {
      display: grid;
      grid-template-columns: 5rem 1fr;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .qi-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem;
      color: var(--text-3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .qi-input {
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: 8px;
      padding: 0.55rem 0.75rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--text);
      outline: none;
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
    }
    .qi-input::placeholder { color: var(--text-3); }
    .qi-input:focus { border-color: rgba(161,52,201,0.4); }
    .qi-btn {
      display: block;
      width: 100%;
      margin-top: 0.875rem;
      padding: 0.65rem;
      background: rgba(161,52,201,0.1);
      border: 1px solid rgba(161,52,201,0.28);
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      text-align: center;
      transition: opacity 0.15s;
    }
    .qi-btn:active { opacity: 0.7; }

    /* Side-by-side URL + upload inside single-episode form */
    .qi-dual {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      min-width: 0;
    }
    .qi-dual .qi-input { flex: 1; min-width: 0; }
    .qi-or {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.55rem;
      color: var(--text-3);
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }
    .qi-file-pick {
      display: block;
      flex-shrink: 0;
      max-width: 5.5rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      background: var(--surface-2);
      border: 1px dashed var(--border-2);
      border-radius: 8px;
      padding: 0.55rem 0.6rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      color: var(--text-3);
      cursor: pointer;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .qi-file-pick.has-file {
      color: var(--green);
      border-color: rgba(107,166,118,0.4);
      border-style: solid;
    }

    /* Bulk Import */
    .bulk-import {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1rem 1.1rem;
    }
    .bulk-csv-note {
      margin-bottom: 0.875rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
    }
    .bulk-csv-note summary {
      color: var(--text-3);
      letter-spacing: 0.1em;
      cursor: pointer;
      list-style: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .bulk-csv-note summary::-webkit-details-marker { display: none; }
    .bulk-csv-note summary::before { content: '▸ '; }
    details[open].bulk-csv-note summary::before { content: '▾ '; }
    .bulk-csv-note pre {
      margin-top: 0.6rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.75rem;
      font-size: 0.58rem;
      color: var(--text-2);
      line-height: 1.65;
      overflow-x: auto;
      white-space: pre;
    }
    .bulk-progress {
      margin-top: 0.75rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      color: var(--text-2);
      letter-spacing: 0.08em;
      text-align: center;
    }

    /* Episode groups */
    .show-group { margin-bottom: 1.25rem; }
    .show-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-2);
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.25rem;
    }
    .ep-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 0;
      border-bottom: 1px solid var(--border);
    }
    .ep-item:last-child { border-bottom: none; }
    .ep-name {
      flex: 1;
      font-size: 0.9rem;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .ep-load-btn {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.3rem 0.625rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem;
      color: var(--text-2);
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.1s, border-color 0.1s;
    }
    .ep-load-btn:active { color: var(--text); border-color: var(--border-2); }
    .ep-del-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.3rem 0.5rem;
      font-size: 0.7rem;
      line-height: 1;
      color: var(--text-3);
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.1s, border-color 0.1s;
    }
    .ep-del-btn:active { color: #c96b6b; border-color: rgba(201,107,107,0.4); }

    .lib-empty {
      text-align: center;
      padding: 2rem 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      color: var(--text-3);
      letter-spacing: 0.15em;
    }

  </style>
</head>
<body>
  <header>
    <h1>Audio <em>Sub</em> Player</h1>
    <p class="tagline">聴く · 読む · 覚える</p>
    <div class="tab-row">
      <button class="tab-btn active" id="tab-player">Player</button>
      <button class="tab-btn" id="tab-library">Library</button>
    </div>
  </header>

  <!-- ── Player view ── -->
  <div id="player-view">
    <button class="choose-lib-btn" id="choose-lib-btn">Choose from Library</button>

    <div class="episode-info" id="episode-info">
      <span class="episode-info-show" id="episode-info-show"></span>
      <span class="episode-info-ep"   id="episode-info-ep"></span>
    </div>

    <audio id="audio" controls playsinline></audio>

    <div class="subtitle-wrap">
      <div class="subtitle-scroll" id="subtitle-scroll"></div>
      <div class="fade-top"></div>
      <div class="fade-bottom"></div>
    </div>

    <div class="controls-row">
      <button class="ctrl-btn" id="prev-btn">← sub</button>
      <button class="ctrl-btn play-btn" id="play-btn">▶</button>
      <button class="ctrl-btn" id="next-btn">sub →</button>
    </div>

    <div class="settings-row">
      <div class="setting-box">
        <span class="setting-label">Offset</span>
        <div class="setting-controls">
          <button class="adj-btn" id="offset-minus">−</button>
          <span class="setting-val"><span id="offset-val">0.0</span>s</span>
          <button class="adj-btn" id="offset-plus">+</button>
        </div>
      </div>
      <div class="setting-box">
        <span class="setting-label">Speed</span>
        <div class="setting-controls">
          <button class="adj-btn" id="speed-minus">−</button>
          <span class="setting-val" id="speed-val">1.0×</span>
          <button class="adj-btn" id="speed-plus">+</button>
        </div>
      </div>
      <div class="setting-box">
        <span class="setting-label">Font</span>
        <div class="setting-controls">
          <button class="adj-btn" id="font-minus">A−</button>
          <span class="setting-val" id="font-val">1.2</span>
          <button class="adj-btn" id="font-plus">A+</button>
        </div>
      </div>
    </div>

    <div class="toggle-row">
      <button class="toggle-btn" id="loop-btn">↻ Loop</button>
      <button class="toggle-btn" id="autopause-btn">|| Auto-pause</button>
    </div>
  </div>

  <!-- ── Library view ── -->
  <div id="library-view">

    <!-- Bulk Import -->
    <details class="lib-section">
      <summary class="lib-section-title">Bulk Import</summary>
      <div class="bulk-import">
        <details class="bulk-csv-note">
          <summary>CSV format</summary>
          <pre>show,episode,audio_url,sub_url
My Show,Episode 1,https://…/ep1.mp3,https://…/ep1.srt
My Show,Episode 2,https://…/ep2.mp3,https://…/ep2.srt</pre>
        </details>
        <label class="qi-btn" for="bulk-csv-file" style="cursor:pointer;">Upload CSV</label>
        <input type="file" id="bulk-csv-file" accept=".csv,text/csv,text/plain" style="display:none">
        <div class="bulk-progress" id="bulk-progress" style="display:none"></div>
      </div>
    </details>

    <!-- Import Single Episode -->
    <details class="lib-section">
      <summary class="lib-section-title">Import Single Episode</summary>
      <div class="quick-import">
        <div class="qi-field-row">
          <span class="qi-label">Show</span>
          <input class="qi-input" id="qi-show" placeholder="Show name" autocorrect="off" autocapitalize="words">
        </div>
        <div class="qi-field-row">
          <span class="qi-label">Episode</span>
          <input class="qi-input" id="qi-ep" placeholder="Episode name or number" autocorrect="off" autocapitalize="words">
        </div>
        <!-- Audio source -->
        <div class="qi-field-row">
          <span class="qi-label">Audio</span>
          <div class="qi-dual">
            <input type="url" class="qi-input" id="qi-audio" placeholder="https://…" autocomplete="off" autocorrect="off" autocapitalize="off">
            <span class="qi-or">or</span>
            <label class="qi-file-pick" id="qi-audio-file-label" for="qi-audio-file-input">upload</label>
            <input type="file" id="qi-audio-file-input" accept="audio/mpeg,audio/mp4,audio/x-m4a,audio/wav,.mp3,.m4a,.wav,.aac" style="display:none">
          </div>
        </div>
        <!-- Sub source -->
        <div class="qi-field-row">
          <span class="qi-label">Sub</span>
          <div class="qi-dual">
            <input type="url" class="qi-input" id="qi-sub" placeholder="https://raw.githubusercontent.com/…" autocomplete="off" autocorrect="off" autocapitalize="off">
            <span class="qi-or">or</span>
            <label class="qi-file-pick" id="qi-sub-file-label" for="qi-sub-file-input">upload</label>
            <input type="file" id="qi-sub-file-input" accept=".srt,.vtt,text/plain" style="display:none">
          </div>
        </div>
        <button class="qi-btn" id="qi-btn">Import &amp; Save</button>
      </div>
    </details>

    <!-- My Library -->
    <div class="lib-section">
      <div class="lib-section-title">My Library</div>
      <div id="library-list"></div>
    </div>

    <div class="lib-section" id="catalogue-section" style="display:none">
      <div class="lib-section-title">Catalogue</div>
      <div id="catalogue-list"></div>
    </div>
  </div>

  <script type="module">
    import { get, set, del, keys } from 'https://cdn.jsdelivr.net/npm/idb-keyval@6/+esm';

    // ── State ──
    let subs        = [];
    let offset      = 0;
    let currentIdx  = -1;
    let loopMode    = false;
    let autoPause   = false;
    let fontSize    = 1.2;

    let loadedAudioBlob   = null;
    let loadedAudioUrl    = null;
    let loadedSrtText     = null;
    let loadedSrtUrl      = null;
    let currentEpisodeKey = null;

    // ── DOM refs ──
    const audio   = document.getElementById('audio');
    const scroll  = document.getElementById('subtitle-scroll');
    const playBtn = document.getElementById('play-btn');

    document.documentElement.style.setProperty('--sub-font', fontSize + 'rem');

    // ── Header padding ──
    const headerEl = document.querySelector('header');
    function syncBodyPad() {
      document.body.style.paddingTop = (headerEl.offsetHeight + 20) + 'px';
    }
    syncBodyPad();
    window.addEventListener('resize', syncBodyPad);

    // ── Tabs ──
    document.getElementById('tab-player').addEventListener('click', () => showTab('player'));
    document.getElementById('tab-library').addEventListener('click', () => {
      showTab('library');
      renderLibrary();
    });

    function showTab(tab) {
      const isPlayer = tab === 'player';
      document.getElementById('player-view').style.display  = isPlayer ? '' : 'none';
      document.getElementById('library-view').style.display = isPlayer ? 'none' : 'block';
      document.getElementById('tab-player').classList.toggle('active', isPlayer);
      document.getElementById('tab-library').classList.toggle('active', !isPlayer);
      syncBodyPad();
    }

    // ── Choose from Library ──
    document.getElementById('choose-lib-btn').addEventListener('click', () => {
      showTab('library');
      renderLibrary();
    });

    // ── SRT ──
    function parseSRT(text) {
      return text.trim().split(/\n\n+/).map(block => {
        const lines = block.split('\n');
        const ti = lines.findIndex(l => l.includes('-->'));
        if (ti < 0) return null;
        const m = lines[ti].match(/(\d+):(\d+):(\d+)[,.](\d+) --> (\d+):(\d+):(\d+)[,.](\d+)/);
        if (!m) return null;
        const s = (h, mn, sc, ms) => +h*3600 + +mn*60 + +sc + +ms/1000;
        return {
          start: s(m[1],m[2],m[3],m[4]),
          end:   s(m[5],m[6],m[7],m[8]),
          text:  lines.slice(ti + 1).join('\n').trim()
        };
      }).filter(Boolean);
    }

    function fmtTime(sec) {
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = Math.floor(sec % 60);
      return h > 0
        ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
        : `${m}:${String(s).padStart(2,'0')}`;
    }

    function loadSRT(text) {
      subs = parseSRT(text);
      currentIdx = -1;
      renderSubList();
    }

    // ── Render subtitle list ──
    function renderSubList() {
      scroll.innerHTML = '';
      if (subs.length === 0) {
        const el = document.createElement('div');
        el.className = 'sub-empty';
        el.textContent = '字幕がここに表示されます';
        scroll.appendChild(el);
        return;
      }
      subs.forEach((sub, i) => {
        const item = document.createElement('div');
        item.className = 'sub-item';
        item.dataset.idx = i;

        const jump = document.createElement('div');
        jump.className = 'sub-jump';
        jump.addEventListener('click', () => jumpToSub(i));

        const content = document.createElement('div');
        content.className = 'sub-content';

        const time = document.createElement('div');
        time.className = 'sub-time';
        time.textContent = fmtTime(sub.start);

        const text = document.createElement('div');
        text.className = 'sub-text';
        text.textContent = sub.text;

        content.appendChild(time);
        content.appendChild(text);
        item.appendChild(jump);
        item.appendChild(content);
        scroll.appendChild(item);
      });
    }

    function setActiveSub(idx) {
      const prev = scroll.querySelector('.sub-item.active');
      if (prev) prev.classList.remove('active');
      currentIdx = idx;
      if (idx < 0) return;
      const el = scroll.querySelector(`[data-idx="${idx}"]`);
      if (!el) return;
      el.classList.add('active');
      scroll.scrollTop = el.offsetTop - (scroll.clientHeight / 2) + (el.offsetHeight / 2);
    }

    function jumpToSub(idx) {
      if (idx < 0 || idx >= subs.length) return;
      audio.currentTime = Math.max(0, subs[idx].start - offset);
    }

    // ── Playback sync ──
    audio.addEventListener('timeupdate', () => {
      const t = audio.currentTime + offset;

      if (loopMode && currentIdx >= 0 && t > subs[currentIdx].end) {
        audio.currentTime = Math.max(0, subs[currentIdx].start - offset);
        return;
      }

      const newIdx = subs.findIndex(s => t >= s.start && t <= s.end);

      if (newIdx !== currentIdx) {
        if (autoPause && currentIdx >= 0 && t > subs[currentIdx].end) {
          setActiveSub(newIdx);
          audio.pause();
        } else {
          setActiveSub(newIdx);
        }
      }
    });

    // ── Play / pause ──
    function togglePlay() {
      if (audio.paused) audio.play().catch(() => {});
      else audio.pause();
    }
    playBtn.addEventListener('click', togglePlay);
    audio.addEventListener('play',  () => { playBtn.textContent = '||'; });
    audio.addEventListener('pause', () => { playBtn.textContent = '▶'; saveLastPosition(); });
    audio.addEventListener('ended', () => { playBtn.textContent = '▶'; saveLastPosition(); });

    // ── Prev / next subtitle ──
    function prevSub() {
      if (!subs.length) return;
      let idx;
      if (currentIdx > 0) {
        idx = currentIdx - 1;
      } else if (currentIdx === 0) {
        idx = 0;
      } else {
        const t = audio.currentTime + offset;
        idx = 0;
        for (let i = subs.length - 1; i >= 0; i--) {
          if (subs[i].start <= t) { idx = i; break; }
        }
      }
      audio.currentTime = Math.max(0, subs[idx].start - offset);
    }

    function nextSub() {
      if (!subs.length) return;
      let idx;
      if (currentIdx >= 0 && currentIdx < subs.length - 1) {
        idx = currentIdx + 1;
      } else if (currentIdx === subs.length - 1) {
        idx = currentIdx;
      } else {
        const t = audio.currentTime + offset;
        idx = subs.length - 1;
        for (let i = 0; i < subs.length; i++) {
          if (subs[i].start > t) { idx = i; break; }
        }
      }
      audio.currentTime = Math.max(0, subs[idx].start - offset);
    }

    document.getElementById('prev-btn').addEventListener('click', prevSub);
    document.getElementById('next-btn').addEventListener('click', nextSub);

    // ── Offset / font ──
    function adjustOffset(delta) {
      offset = Math.round((offset + delta) * 10) / 10;
      document.getElementById('offset-val').textContent = offset.toFixed(1);
      persistOffsetToLibrary();
    }

    function adjustSpeed(delta) {
      const speed = Math.round(Math.max(0.5, Math.min(2.0, audio.playbackRate + delta)) * 4) / 4;
      audio.playbackRate = speed;
      document.getElementById('speed-val').textContent = speed.toFixed(2).replace(/\.?0+$/, '') + '×';
      persistSpeedToLibrary();
    }

    function adjustFont(delta) {
      fontSize = Math.round(Math.max(0.8, Math.min(3.0, fontSize + delta)) * 10) / 10;
      document.documentElement.style.setProperty('--sub-font', fontSize + 'rem');
      document.getElementById('font-val').textContent = fontSize.toFixed(1);
    }

    document.getElementById('offset-minus').addEventListener('click', () => adjustOffset(-0.5));
    document.getElementById('offset-plus').addEventListener('click',  () => adjustOffset(+0.5));
    document.getElementById('speed-minus').addEventListener('click',  () => adjustSpeed(-0.25));
    document.getElementById('speed-plus').addEventListener('click',   () => adjustSpeed(+0.25));
    document.getElementById('font-minus').addEventListener('click',   () => adjustFont(-0.1));
    document.getElementById('font-plus').addEventListener('click',    () => adjustFont(+0.1));

    // ── Toggles ──
    document.getElementById('loop-btn').addEventListener('click', () => {
      loopMode = !loopMode;
      document.getElementById('loop-btn').classList.toggle('on', loopMode);
    });
    document.getElementById('autopause-btn').addEventListener('click', () => {
      autoPause = !autoPause;
      document.getElementById('autopause-btn').classList.toggle('on', autoPause);
    });

    // ── Persist to IndexedDB ──
    async function saveLastPosition() {
      if (!currentEpisodeKey) return;
      const data = await get(currentEpisodeKey);
      if (!data) return;
      data.lastPosition = audio.currentTime;
      data.speed = audio.playbackRate;
      await set(currentEpisodeKey, data);
    }

    async function persistOffsetToLibrary() {
      if (!currentEpisodeKey) return;
      const data = await get(currentEpisodeKey);
      if (!data) return;
      data.offset = offset;
      await set(currentEpisodeKey, data);
    }

    async function persistSpeedToLibrary() {
      if (!currentEpisodeKey) return;
      const data = await get(currentEpisodeKey);
      if (!data) return;
      data.speed = audio.playbackRate;
      await set(currentEpisodeKey, data);
    }

    function syncSpeedDisplay() {
      const s = audio.playbackRate;
      document.getElementById('speed-val').textContent = s.toFixed(2).replace(/\.?0+$/, '') + '×';
    }

    window.addEventListener('pagehide', () => { saveLastPosition(); });

    // ── Load episode from library ──
    async function loadEpisodeFromLibrary(key) {
      const data = await get(key);
      if (!data) return;

      if (loadedAudioBlob) URL.revokeObjectURL(audio.src);
      currentEpisodeKey = key;

      if (data.audio) {
        loadedAudioBlob = data.audio;
        loadedAudioUrl  = null;
        audio.src = URL.createObjectURL(data.audio);
      } else if (data.audioUrl) {
        loadedAudioBlob = null;
        loadedAudioUrl  = data.audioUrl;
        audio.src = data.audioUrl;
      }
      audio.load();

      offset = data.offset || 0;
      document.getElementById('offset-val').textContent = offset.toFixed(1);
      audio.playbackRate = data.speed || 1;
      syncSpeedDisplay();

      loadedSrtText = data.srt;
      loadedSrtUrl  = data.srtUrl || null;
      subs = parseSRT(data.srt);
      currentIdx = -1;
      renderSubList();

      const pos = data.lastPosition || 0;
      if (pos > 0) {
        audio.addEventListener('loadedmetadata', () => { audio.currentTime = pos; }, { once: true });
      }

      document.getElementById('episode-info-show').textContent = data.showName;
      document.getElementById('episode-info-ep').textContent   = data.episodeName;
      document.getElementById('episode-info').classList.add('visible');

      setMediaSessionMetadata(data.showName, data.episodeName);
      showTab('player');
    }

    // ── Media Session API ──
    function setMediaSessionMetadata(showName, episodeName) {
      if (!('mediaSession' in navigator)) return;
      navigator.mediaSession.metadata = new MediaMetadata({
        title:  episodeName,
        artist: showName,
        album:  'Audio Sub Player'
      });
    }

    function setupMediaSession() {
      if (!('mediaSession' in navigator)) return;
      navigator.mediaSession.setActionHandler('play',  () => audio.play().catch(() => {}));
      navigator.mediaSession.setActionHandler('pause', () => audio.pause());
      navigator.mediaSession.setActionHandler('previoustrack', prevSub);
      navigator.mediaSession.setActionHandler('nexttrack',     nextSub);
      navigator.mediaSession.setActionHandler('seekbackward', ({ seekOffset }) => {
        audio.currentTime = Math.max(0, audio.currentTime - (seekOffset ?? 10));
      });
      navigator.mediaSession.setActionHandler('seekforward', ({ seekOffset }) => {
        audio.currentTime = Math.min(audio.duration || Infinity, audio.currentTime + (seekOffset ?? 10));
      });
    }

    // ── Library render ──
    async function renderLibrary() {
      const allKeys = await keys();
      const epKeys  = allKeys.filter(k => typeof k === 'string' && k.startsWith('episode:'));
      const listEl  = document.getElementById('library-list');
      listEl.innerHTML = '';

      if (epKeys.length === 0) {
        listEl.innerHTML = '<div class="lib-empty">No episodes saved yet.</div>';
        return;
      }

      const episodes = await Promise.all(epKeys.map(async k => ({ key: k, ...await get(k) })));

      episodes.sort((a, b) => {
        const sc = (a.showName || '').localeCompare(b.showName || '', 'ja');
        return sc !== 0 ? sc : a.addedAt - b.addedAt;
      });

      const groups = {};
      episodes.forEach(ep => {
        const show = ep.showName || '(no show)';
        if (!groups[show]) groups[show] = [];
        groups[show].push(ep);
      });

      Object.entries(groups).forEach(([show, eps]) => {
        const group = document.createElement('div');
        group.className = 'show-group';

        const showEl = document.createElement('div');
        showEl.className = 'show-name';
        showEl.textContent = show;
        group.appendChild(showEl);

        eps.forEach(ep => {
          const item = document.createElement('div');
          item.className = 'ep-item';

          const nameEl = document.createElement('div');
          nameEl.className = 'ep-name';
          nameEl.textContent = ep.episodeName || ep.key;

          const loadBtn = document.createElement('button');
          loadBtn.className = 'ep-load-btn';
          loadBtn.textContent = '▶ Load';
          loadBtn.addEventListener('click', () => loadEpisodeFromLibrary(ep.key));

          const delBtn = document.createElement('button');
          delBtn.className = 'ep-del-btn';
          delBtn.textContent = '×';
          delBtn.addEventListener('click', async () => {
            if (!confirm(`Delete "${ep.episodeName}"?`)) return;
            await del(ep.key);
            if (currentEpisodeKey === ep.key) currentEpisodeKey = null;
            renderLibrary();
          });

          item.appendChild(nameEl);
          item.appendChild(loadBtn);
          item.appendChild(delBtn);
          group.appendChild(item);
        });

        listEl.appendChild(group);
      });
    }

    // ── Import Single Episode ──
    let qiAudioFile = null;
    let qiSubFile   = null;

    document.getElementById('qi-audio-file-input').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      qiAudioFile = file;
      const label = document.getElementById('qi-audio-file-label');
      label.textContent = file.name;
      label.classList.add('has-file');
    });

    document.getElementById('qi-sub-file-input').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      qiSubFile = file;
      const label = document.getElementById('qi-sub-file-label');
      label.textContent = file.name;
      label.classList.add('has-file');
    });

    document.getElementById('qi-btn').addEventListener('click', async () => {
      const show     = document.getElementById('qi-show').value.trim();
      const ep       = document.getElementById('qi-ep').value.trim();
      const audioUrl = document.getElementById('qi-audio').value.trim();
      const subUrl   = document.getElementById('qi-sub').value.trim();

      if (!show || !ep) { alert('Please enter show name and episode name.'); return; }
      if (!qiAudioFile && !audioUrl) { alert('Please provide an audio file or URL.'); return; }
      if (!qiSubFile   && !subUrl)   { alert('Please provide a subtitle file or URL.'); return; }

      const btn = document.getElementById('qi-btn');
      btn.textContent = (!qiSubFile && subUrl) ? 'Fetching SRT…' : 'Saving…';
      btn.style.opacity = '0.6';

      try {
        let srtText, resolvedSrtUrl = null, audioBlob = null, resolvedAudioUrl = null;

        if (qiSubFile) {
          srtText = await qiSubFile.text();
        } else {
          const res = await fetch(subUrl);
          if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
          srtText = await res.text();
          resolvedSrtUrl = subUrl;
        }

        if (qiAudioFile) {
          audioBlob = qiAudioFile;
        } else {
          resolvedAudioUrl = audioUrl;
        }

        const key = `episode:${show}|||${ep}`;
        await set(key, {
          showName:     show,
          episodeName:  ep,
          audio:        audioBlob,
          audioUrl:     resolvedAudioUrl,
          srt:          srtText,
          srtUrl:       resolvedSrtUrl,
          offset:       0,
          lastPosition: 0,
          speed:        1,
          addedAt:      Date.now(),
          notes:        ''
        });

        // Reset form (keep show name)
        document.getElementById('qi-ep').value    = '';
        document.getElementById('qi-audio').value = '';
        document.getElementById('qi-sub').value   = '';
        qiAudioFile = null; qiSubFile = null;
        document.getElementById('qi-audio-file-input').value = '';
        document.getElementById('qi-sub-file-input').value   = '';
        const aLabel = document.getElementById('qi-audio-file-label');
        aLabel.textContent = 'upload'; aLabel.classList.remove('has-file');
        const sLabel = document.getElementById('qi-sub-file-label');
        sLabel.textContent = 'upload'; sLabel.classList.remove('has-file');

        btn.textContent = 'Saved ✓';
        btn.style.opacity = '1';
        btn.style.color = 'var(--green)';
        setTimeout(() => { btn.textContent = 'Import & Save'; btn.style.color = ''; }, 2000);
        renderLibrary();
      } catch (err) {
        alert('Could not import: ' + err.message);
        btn.textContent = 'Import & Save';
        btn.style.opacity = '1';
      }
    });

    // ── Bulk Import ──
    document.getElementById('bulk-csv-file').addEventListener('change', async e => {
      const file = e.target.files[0];
      if (!file) return;
      e.target.value = '';

      const text = await file.text();
      const rows = parseCSV(text);
      if (rows.length === 0) { alert('No valid rows found in CSV.'); return; }

      const progress = document.getElementById('bulk-progress');
      progress.style.display = '';
      let saved = 0;
      const errors = [];

      for (let i = 0; i < rows.length; i++) {
        const row = rows[i];
        progress.textContent = `Importing ${i + 1} / ${rows.length}…`;
        try {
          const srtRes = await fetch(row.sub_url);
          if (!srtRes.ok) throw new Error('HTTP ' + srtRes.status);
          const srtText = await srtRes.text();
          const key = `episode:${row.show}|||${row.episode}`;
          await set(key, {
            showName:     row.show,
            episodeName:  row.episode,
            audio:        null,
            audioUrl:     row.audio_url || null,
            srt:          srtText,
            srtUrl:       row.sub_url,
            offset:       0,
            lastPosition: 0,
            speed:        1,
            addedAt:      Date.now(),
            notes:        ''
          });
          saved++;
        } catch (err) {
          errors.push({ show: row.show, episode: row.episode, reason: err.message });
        }
      }

      progress.innerHTML = '';
      const summary = document.createElement('div');
      summary.textContent = `Done — ${saved} saved${errors.length ? `, ${errors.length} failed` : ''}.`;
      progress.appendChild(summary);

      if (errors.length) {
        const errList = document.createElement('div');
        errList.style.cssText = 'margin-top:0.5rem; text-align:left;';
        errors.forEach(e => {
          const line = document.createElement('div');
          line.style.cssText = 'color:#c96b6b; margin-top:0.25rem;';
          line.textContent = `✕ ${e.show} · ${e.episode} — ${e.reason}`;
          errList.appendChild(line);
        });
        progress.appendChild(errList);
      }

      renderLibrary();
    });

    function parseCSV(text) {
      const lines = text.trim().split(/\r?\n/);
      if (lines.length < 2) return [];
      const header = parseCSVRow(lines[0]).map(h => h.trim().toLowerCase());
      return lines.slice(1)
        .map(line => {
          const vals = parseCSVRow(line);
          const row = {};
          header.forEach((h, i) => { row[h] = (vals[i] || '').trim(); });
          return row;
        })
        .filter(r => r.show && r.episode && r.sub_url);
    }

    function parseCSVRow(line) {
      const result = [];
      let cur = '', inQuote = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') {
          if (inQuote && line[i + 1] === '"') { cur += '"'; i++; }
          else inQuote = !inQuote;
        } else if (c === ',' && !inQuote) {
          result.push(cur); cur = '';
        } else {
          cur += c;
        }
      }
      result.push(cur);
      return result;
    }

    // ── Catalogue ──
    async function loadCatalogue() {
      try {
        const res = await fetch('./subtitles/episodes.json');
        if (!res.ok) return;
        const data = await res.json();
        if (!Array.isArray(data.catalogue) || data.catalogue.length === 0) return;

        const section = document.getElementById('catalogue-section');
        const listEl  = document.getElementById('catalogue-list');
        section.style.display = '';

        data.catalogue.forEach(ep => {
          const item = document.createElement('div');
          item.className = 'ep-item';

          const nameEl = document.createElement('div');
          nameEl.className = 'ep-name';
          nameEl.textContent = `${ep.showName} · ${ep.episodeName}`;

          const loadBtn = document.createElement('button');
          loadBtn.className = 'ep-load-btn';
          loadBtn.textContent = '▶ Load';
          loadBtn.addEventListener('click', async () => {
            loadBtn.textContent = '…';
            const key = `episode:${ep.showName}|||${ep.episodeName}`;
            const existing = await get(key);
            if (existing) {
              loadEpisodeFromLibrary(key);
              return;
            }
            try {
              const srtRes = await fetch(ep.srtUrl);
              if (!srtRes.ok) throw new Error('SRT fetch failed');
              const srtText = await srtRes.text();
              await set(key, {
                showName:     ep.showName,
                episodeName:  ep.episodeName,
                audio:        null,
                audioUrl:     ep.audioUrl,
                srt:          srtText,
                srtUrl:       ep.srtUrl,
                offset:       0,
                lastPosition: 0,
                speed:        1,
                addedAt:      Date.now(),
                notes:        ''
              });
              loadEpisodeFromLibrary(key);
            } catch (err) {
              alert('Could not load episode: ' + err.message);
              loadBtn.textContent = '▶ Load';
            }
          });

          item.appendChild(nameEl);
          item.appendChild(loadBtn);
          listEl.appendChild(item);
        });
      } catch (_) {
        // episodes.json absent or malformed — silently skip
      }
    }

    // ── Init ──
    setupMediaSession();
    renderSubList();
    loadCatalogue();
  </script>
</body>
</html>
