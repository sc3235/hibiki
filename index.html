<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Audio Sub Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #111009;
      --surface:   #1c1916;
      --surface-2: #242118;
      --border:    #2e2b22;
      --border-2:  #3a362b;
      --text:      #ede8dd;
      --text-2:    #7d7567;
      --text-3:    #453f35;
      --accent:    #a134c9;
      --green:     #6ba676;
      --radius:    14px;
      --sub-font:  1.5rem;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding: 2.5rem 1.5rem 4rem;
      max-width: 600px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1;
    }
    h1 em { font-style: italic; color: var(--accent); }
    .tagline {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--text-3);
      margin-top: 0.55rem;
    }

    /* ── File loaders ── */
    .file-section {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.75rem;
    }
    .file-slot {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    input[type="file"] { display: none; }

    .file-btn {
      display: grid;
      grid-template-columns: auto 1fr;
      grid-template-rows: auto auto;
      align-items: center;
      column-gap: 0.75rem;
      row-gap: 0.1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.65rem 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-2);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.2s, background 0.15s;
      letter-spacing: 0.06em;
    }
    .file-btn:active { background: var(--surface-2); }
    .file-btn .icon {
      grid-column: 1;
      grid-row: 1 / 3;
      width: 2rem; height: 2rem;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface-2);
      border-radius: 8px;
      font-size: 1rem;
      color: var(--text-2);
    }
    .file-btn .label {
      grid-column: 2;
      grid-row: 1;
      align-self: end;
      font-weight: 500;
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--text-2);
    }
    .file-btn .status {
      grid-column: 2;
      grid-row: 2;
      align-self: start;
      font-size: 0.65rem;
      color: var(--text-3);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }
    .file-btn.loaded { border-color: rgba(107,166,118,0.4); }
    .file-btn.loaded .status { color: var(--green); }
    .file-btn.loaded .label  { color: var(--text); }

    /* URL link + inline input */
    .url-link {
      display: block;
      width: 100%;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      color: var(--text-3);
      letter-spacing: 0.1em;
      padding: 0.3rem 0;
      background: none;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .url-input-row {
      display: none;
      gap: 0.35rem;
      align-items: stretch;
    }
    .url-input-row.visible { display: flex; }
    .url-field {
      flex: 1;
      min-width: 0;
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: 8px;
      padding: 0.75rem 0.875rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--text);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }
    .url-field::placeholder { color: var(--text-3); }
    .url-confirm, .url-cancel {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 0.75rem;
      font-size: 0.8rem;
      color: var(--text-2);
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Native audio ── */
    audio {
      width: 100%;
      border-radius: var(--radius);
      margin-bottom: 1.25rem;
    }

    /* ── Subtitle scroll ── */
    .subtitle-wrap {
      position: relative;
      margin-bottom: 1rem;
    }
    .subtitle-wrap::before {
      content: '';
      position: absolute;
      top: 0; left: 20%; right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.5;
      z-index: 2;
      pointer-events: none;
    }

    .subtitle-scroll {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      height: 52vh;
      min-height: 260px;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
      padding: 25vh 0;
    }
    .subtitle-scroll::-webkit-scrollbar { display: none; }

    .fade-top, .fade-bottom {
      position: absolute;
      left: 0; right: 0;
      height: 5rem;
      pointer-events: none;
      z-index: 1;
    }
    .fade-top    { top: 0;    background: linear-gradient(to bottom, var(--surface), transparent); border-radius: 20px 20px 0 0; }
    .fade-bottom { bottom: 0; background: linear-gradient(to top,    var(--surface), transparent); border-radius: 0 0 20px 20px; }

    .sub-empty {
      text-align: center;
      padding: 0 2rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-3);
      letter-spacing: 0.2em;
    }

    .sub-item {
      display: flex;
      align-items: stretch;
      opacity: 0.28;
      transition: opacity 0.2s;
    }
    .sub-item.active { opacity: 1; }

    .sub-jump {
      flex-shrink: 0;
      width: 14px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      margin: 0.3rem 0;
    }
    .sub-jump::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      background: var(--border-2);
      border-radius: 1px;
      transition: background 0.15s, width 0.15s;
    }
    .sub-jump:active::after,
    .sub-jump:hover::after {
      width: 4px;
      background: var(--accent);
    }
    .sub-item.active .sub-jump::after {
      background: var(--accent);
      opacity: 0.7;
    }

    .sub-content {
      flex: 1;
      min-width: 0;
      padding: 0.55rem 1.75rem 0.55rem 0.5rem;
    }

    .sub-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem;
      color: var(--text-3);
      letter-spacing: 0.15em;
      margin-bottom: 0.15rem;
    }
    .sub-item.active .sub-time { color: var(--text-2); }

    .sub-text {
      font-family: 'Noto Serif JP', 'Hiragino Mincho ProN', serif;
      font-size: var(--sub-font);
      line-height: 1.8;
      color: var(--text);
      user-select: text;
      -webkit-user-select: text;
      font-weight: 300;
    }
    .sub-item.active .sub-text { font-weight: 400; }

    /* ── Controls ── */
    .controls-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    .ctrl-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.75rem 1.1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-2);
      cursor: pointer;
      letter-spacing: 0.05em;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.12s, color 0.12s;
    }
    .ctrl-btn:active { background: var(--surface-2); color: var(--text); }
    .play-btn {
      background: var(--surface-2);
      border-color: var(--border-2);
      width: 5rem;
      padding: 0.75rem 0;
      text-align: center;
      font-size: 1.05rem;
      color: var(--text);
    }

    /* ── Settings row ── */
    .settings-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .setting-box {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.65rem 0.875rem;
    }
    .setting-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.18em;
    }
    .setting-controls {
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }
    .setting-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      font-weight: 500;
      min-width: 2.6rem;
      text-align: center;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .adj-btn {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.3rem 0.55rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-2);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .adj-btn:active { background: var(--border-2); }

    /* ── Toggles ── */
    .toggle-row {
      display: flex;
      gap: 0.5rem;
    }
    .toggle-btn {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      color: var(--text-3);
      letter-spacing: 0.12em;
      cursor: pointer;
      text-transform: uppercase;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .toggle-btn.on {
      background: rgba(161,52,201,0.1);
      border-color: rgba(161,52,201,0.4);
      color: var(--accent);
    }
  </style>
</head>
<body>
  <header>
    <h1>Audio <em>Sub</em> Player</h1>
    <p class="tagline">聴く · 読む · 覚える</p>
  </header>

  <div class="file-section">
    <div class="file-slot">
      <label class="file-btn" id="audio-btn" for="audio-file">
        <span class="icon">♪</span>
        <span class="label">Audio</span>
        <span class="status">Tap to load</span>
      </label>
      <input type="file" id="audio-file" accept="audio/mpeg,audio/mp4,audio/x-m4a,audio/wav,.mp3,.m4a,.wav,.aac">
      <button class="url-link" onclick="showUrl('audio')">paste url ↗</button>
      <div class="url-input-row" id="audio-url-row">
        <input type="url" class="url-field" id="audio-url-field" placeholder="https://…" autocomplete="off" autocorrect="off" autocapitalize="off">
        <button class="url-confirm" onclick="confirmUrl('audio')">✓</button>
        <button class="url-cancel"  onclick="hideUrl('audio')">✕</button>
      </div>
    </div>

    <div class="file-slot">
      <label class="file-btn" id="sub-btn" for="sub-file">
        <span class="icon">字</span>
        <span class="label">Subtitles</span>
        <span class="status">Tap to load</span>
      </label>
      <input type="file" id="sub-file" accept=".srt,.vtt,text/plain">
      <button class="url-link" onclick="showUrl('sub')">paste url ↗</button>
      <div class="url-input-row" id="sub-url-row">
        <input type="url" class="url-field" id="sub-url-field" placeholder="https://…" autocomplete="off" autocorrect="off" autocapitalize="off">
        <button class="url-confirm" onclick="confirmUrl('sub')">✓</button>
        <button class="url-cancel"  onclick="hideUrl('sub')">✕</button>
      </div>
    </div>
  </div>

  <audio id="audio" controls playsinline></audio>

  <div class="subtitle-wrap">
    <div class="subtitle-scroll" id="subtitle-scroll"></div>
    <div class="fade-top"></div>
    <div class="fade-bottom"></div>
  </div>

  <div class="controls-row">
    <button class="ctrl-btn" onclick="prevSub()">← sub</button>
    <button class="ctrl-btn play-btn" id="play-btn" onclick="togglePlay()">▶</button>
    <button class="ctrl-btn" onclick="nextSub()">sub →</button>
  </div>

  <div class="settings-row">
    <div class="setting-box">
      <span class="setting-label">Offset</span>
      <div class="setting-controls">
        <button class="adj-btn" onclick="adjustOffset(-0.5)">−</button>
        <span class="setting-val"><span id="offset-val">0.0</span>s</span>
        <button class="adj-btn" onclick="adjustOffset(+0.5)">+</button>
      </div>
    </div>
    <div class="setting-box">
      <span class="setting-label">Font</span>
      <div class="setting-controls">
        <button class="adj-btn" onclick="adjustFont(-0.1)">A−</button>
        <span class="setting-val" id="font-val">1.2</span>
        <button class="adj-btn" onclick="adjustFont(+0.1)">A+</button>
      </div>
    </div>
  </div>

  <div class="toggle-row">
    <button class="toggle-btn" id="loop-btn"      onclick="toggleLoop()">↻ Loop</button>
    <button class="toggle-btn" id="autopause-btn" onclick="toggleAutoPause()">|| Auto-pause</button>
  </div>

  <script>
    let subs        = [];
    let offset      = 0;
    let currentIdx  = -1;
    let loopMode    = false;
    let autoPause   = false;
    let fontSize    = 1.2;

    const audio   = document.getElementById('audio');
    const scroll  = document.getElementById('subtitle-scroll');
    const playBtn = document.getElementById('play-btn');

    document.documentElement.style.setProperty('--sub-font', fontSize + 'rem');

    /* ── File inputs ── */
    document.getElementById('audio-file').onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      audio.src = URL.createObjectURL(file);
      audio.load();
      markLoaded('audio', file.name);
    };

    document.getElementById('sub-file').onchange = async e => {
      const file = e.target.files[0];
      if (!file) return;
      loadSRT(await file.text(), file.name);
    };

    function markLoaded(type, name) {
      const btn = document.getElementById(type + '-btn');
      btn.classList.add('loaded');
      btn.querySelector('.status').textContent = name;
    }

    /* ── URL inputs ── */
    function showUrl(type) {
      document.getElementById(type + '-url-row').classList.add('visible');
      document.getElementById(type + '-url-field').focus();
    }
    function hideUrl(type) {
      document.getElementById(type + '-url-row').classList.remove('visible');
    }
    async function confirmUrl(type) {
      const url = document.getElementById(type + '-url-field').value.trim();
      if (!url) return;
      const label = url.split('/').pop().split('?')[0] || url;
      if (type === 'audio') {
        audio.src = url;
        audio.load();
        markLoaded('audio', label);
        hideUrl('audio');
      } else {
        try {
          const res = await fetch(url);
          if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
          loadSRT(await res.text(), label);
          hideUrl('sub');
        } catch (err) {
          alert('Could not fetch SRT: ' + err.message);
        }
      }
    }

    ['audio', 'sub'].forEach(type => {
      document.getElementById(type + '-url-field').addEventListener('keydown', e => {
        if (e.key === 'Enter') confirmUrl(type);
        if (e.key === 'Escape') hideUrl(type);
      });
    });

    /* ── SRT ── */
    function parseSRT(text) {
      return text.trim().split(/\n\n+/).map(block => {
        const lines = block.split('\n');
        const ti = lines.findIndex(l => l.includes('-->'));
        if (ti < 0) return null;
        const m = lines[ti].match(/(\d+):(\d+):(\d+)[,.](\d+) --> (\d+):(\d+):(\d+)[,.](\d+)/);
        if (!m) return null;
        const s = (h, mn, sc, ms) => +h*3600 + +mn*60 + +sc + +ms/1000;
        return {
          start: s(m[1],m[2],m[3],m[4]),
          end:   s(m[5],m[6],m[7],m[8]),
          text:  lines.slice(ti + 1).join('\n').trim()
        };
      }).filter(Boolean);
    }

    function fmtTime(sec) {
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = Math.floor(sec % 60);
      return h > 0
        ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
        : `${m}:${String(s).padStart(2,'0')}`;
    }

    function loadSRT(text, name) {
      subs = parseSRT(text);
      currentIdx = -1;
      renderSubList();
      if (name) markLoaded('sub', name);
    }

    /* ── Render subtitle list ── */
    function renderSubList() {
      scroll.innerHTML = '';
      if (subs.length === 0) {
        const el = document.createElement('div');
        el.className = 'sub-empty';
        el.textContent = '字幕がここに表示されます';
        scroll.appendChild(el);
        return;
      }
      subs.forEach((sub, i) => {
        const item = document.createElement('div');
        item.className = 'sub-item';
        item.dataset.idx = i;

        const jump = document.createElement('div');
        jump.className = 'sub-jump';
        jump.addEventListener('click', () => jumpToSub(i));

        const content = document.createElement('div');
        content.className = 'sub-content';

        const time = document.createElement('div');
        time.className = 'sub-time';
        time.textContent = fmtTime(sub.start);

        const text = document.createElement('div');
        text.className = 'sub-text';
        text.textContent = sub.text;

        content.appendChild(time);
        content.appendChild(text);
        item.appendChild(jump);
        item.appendChild(content);
        scroll.appendChild(item);
      });
    }

    function setActiveSub(idx) {
      const prev = scroll.querySelector('.sub-item.active');
      if (prev) prev.classList.remove('active');
      currentIdx = idx;
      if (idx < 0) return;
      const el = scroll.querySelector(`[data-idx="${idx}"]`);
      if (!el) return;
      el.classList.add('active');
      // center in container
      scroll.scrollTop = el.offsetTop - (scroll.clientHeight / 2) + (el.offsetHeight / 2);
    }

    function jumpToSub(idx) {
      if (idx < 0 || idx >= subs.length) return;
      audio.currentTime = Math.max(0, subs[idx].start - offset);
    }

    /* ── Playback sync ── */
    audio.addEventListener('timeupdate', () => {
      const t = audio.currentTime + offset;

      if (loopMode && currentIdx >= 0 && t > subs[currentIdx].end) {
        audio.currentTime = Math.max(0, subs[currentIdx].start - offset);
        return;
      }

      const newIdx = subs.findIndex(s => t >= s.start && t <= s.end);

      if (newIdx !== currentIdx) {
        if (autoPause && currentIdx >= 0 && t > subs[currentIdx].end) {
          setActiveSub(newIdx);
          audio.pause();
        } else {
          setActiveSub(newIdx);
        }
      }
    });

    /* ── Play / pause ── */
    function togglePlay() {
      if (audio.paused) audio.play().catch(() => {});
      else audio.pause();
    }
    audio.addEventListener('play',  () => { playBtn.textContent = '||'; });
    audio.addEventListener('pause', () => { playBtn.textContent = '▶'; });
    audio.addEventListener('ended', () => { playBtn.textContent = '▶'; });

    /* ── Prev / next subtitle ── */
    function prevSub() {
      if (!subs.length) return;
      let idx;
      if (currentIdx > 0) {
        idx = currentIdx - 1;
      } else if (currentIdx === 0) {
        idx = 0;
      } else {
        const t = audio.currentTime + offset;
        idx = 0;
        for (let i = subs.length - 1; i >= 0; i--) {
          if (subs[i].start <= t) { idx = i; break; }
        }
      }
      audio.currentTime = Math.max(0, subs[idx].start - offset);
    }

    function nextSub() {
      if (!subs.length) return;
      let idx;
      if (currentIdx >= 0 && currentIdx < subs.length - 1) {
        idx = currentIdx + 1;
      } else if (currentIdx === subs.length - 1) {
        idx = currentIdx;
      } else {
        const t = audio.currentTime + offset;
        idx = subs.length - 1;
        for (let i = 0; i < subs.length; i++) {
          if (subs[i].start > t) { idx = i; break; }
        }
      }
      audio.currentTime = Math.max(0, subs[idx].start - offset);
    }

    /* ── Offset / font ── */
    function adjustOffset(delta) {
      offset = Math.round((offset + delta) * 10) / 10;
      document.getElementById('offset-val').textContent = offset.toFixed(1);
    }

    function adjustFont(delta) {
      fontSize = Math.round(Math.max(0.8, Math.min(3.0, fontSize + delta)) * 10) / 10;
      document.documentElement.style.setProperty('--sub-font', fontSize + 'rem');
      document.getElementById('font-val').textContent = fontSize.toFixed(1);
    }

    /* ── Toggles ── */
    function toggleLoop() {
      loopMode = !loopMode;
      document.getElementById('loop-btn').classList.toggle('on', loopMode);
    }
    function toggleAutoPause() {
      autoPause = !autoPause;
      document.getElementById('autopause-btn').classList.toggle('on', autoPause);
    }

    /* ── Init ── */
    renderSubList();
  </script>
</body>
</html>
